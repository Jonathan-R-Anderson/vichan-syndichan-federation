# clamd configuration for the vichan upload scanner (network INSTREAM scanning).
# Mounted into the clamav/clamav container at /etc/clamav/clamd.conf.

DatabaseDirectory /var/lib/clamav
TemporaryDirectory /tmp
LogTime yes
LogClean no
LogSyslog no
Foreground yes

# Listen on TCP so the php container can reach the daemon at clamav:3310.
TCPSocket 3310
TCPAddr 0.0.0.0

# Local unix socket, used by the container HEALTHCHECK (clamdcheck.sh).
LocalSocket /run/clamav/clamd.sock

# Size limits. These MUST be >= the largest upload you accept, otherwise clamd answers
# "INSTREAM size limit exceeded" and the scan reports an error instead of a verdict.
# Keep them in step with $config['max_filesize'] in the board config.
StreamMaxLength 100M
MaxFileSize 100M
MaxScanSize 400M

# Detect a few extra classes of unwanted content beyond classic malware.
DetectPUA no
ScanArchive yes
MaxThreads 8
MaxConnectionQueueLength 30
ReadTimeout 60
