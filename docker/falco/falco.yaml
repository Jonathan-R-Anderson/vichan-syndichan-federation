# Falco configuration for the vichan stack.
# Mounted at /etc/falco/falco.yaml. Runtime threat detection via modern eBPF (CO-RE), so no
# kernel headers or a compiled driver are required on the host (needs Linux >= 5.8).

# Rule files, loaded in order. The default ruleset is installed by falcoctl in the official
# image; rules.d/ holds this repo's vichan-specific rules.
rules_files:
  - /etc/falco/falco_rules.yaml
  - /etc/falco/falco_rules.local.yaml
  - /etc/falco/rules.d

# Falco 0.41+ moved the container.* fields (container.name, container.image, …) out of the
# core engine into the "container" plugin, and the default ruleset now REQUIRES it — without
# this block Falco refuses to start ("Plugin requirement not satisfied: container"). The
# plugin (libcontainer.so) ships in the image; its default "engines" auto-detect the runtime
# socket, so the host docker socket mounted at /host/var/run/docker.sock is picked up (Falco
# resolves it under HOST_ROOT=/host, set in compose.yml).
load_plugins: [container]
plugins:
  - name: container
    library_path: libcontainer.so
    init_config:
      label_max_len: 100
      with_size: false

# Use the modern, kernel-header-free eBPF probe.
engine:
  kind: modern_ebpf

# Emit structured JSON so the mod panel (?/falco) can parse each alert reliably.
json_output: true
json_include_output_property: true
json_include_tags_property: true

# Send alerts to the container log (docker logs vichan_falco) ...
stdout_output:
  enabled: true

# ... and to a file the php container reads read-only for the admin panel.
file_output:
  enabled: true
  keep_alive: false
  filename: /var/log/falco/events.log

# Only surface NOTICE and above; drop DEBUG/INFO chatter.
priority: notice

# Falco's own diagnostic logging (not security alerts).
log_stderr: true
log_syslog: false
log_level: info

syslog_output:
  enabled: false
