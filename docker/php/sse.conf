; Dedicated php-fpm pool for the Server-Sent Events endpoint (sse.php).
;
; SSE streams are long-lived but spend nearly all their time sleeping between Redis checks, so
; they are cheap to keep around. Running them in their OWN pool with an isolated worker budget
; means a crowd of open streams can never starve the main page-serving pool (www, on :9000).

[sse]
access.log = /proc/self/fd/2
catch_workers_output = yes
decorate_workers_output = no

user = www-data
group = www-data

; Reachable from the nginx container as php:9001.
listen = 0.0.0.0:9001

pm = static
pm.max_children = 64

; Never let FPM time out a stream mid-connection; sse.php enforces its own max lifetime.
request_terminate_timeout = 0
